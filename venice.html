<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="icon" href="data:,"><title>🛶 Venice Walking Tour</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Cinzel:wght@600;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><link rel="stylesheet" href="style.css"></head><body><main class="container"><header class="tour-hero"><h1>🛶 Venice Walking Tour</h1><p class="subtitle">12 stops · Sunday, July 26</p><div class="stats"><div class="stat">12 stops</div><div class="stat">Afternoon to blue hour</div><div class="stat">Walk + vaporetto</div></div><a class="top-link" href="index.html">← Back to trip</a></header><div class="route-note" id="routeNote"></div><div id="map" class="map"></div><section id="stopList"></section></main><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>window.TRIP_CONFIG={"supabaseUrl":"https://xsfvzedpkiqgipnftdxb.supabase.co","supabaseAnon":"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzZnZ6ZWRwa2lxZ2lwbmZ0ZHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3OTYyMTMsImV4cCI6MjA4NzM3MjIxM30.mytDq_kTTFTdZsT8OJYL9Zviz3JMN0HuqqKX1W-IhPM","family":[{"id":"calvin","emoji":"👨","name":"Calvin"},{"id":"karissa","emoji":"👩","name":"Karissa"},{"id":"christian","emoji":"👦","name":"Christian"},{"id":"tori","emoji":"👧","name":"Tori"}]};window.TOUR_STOPS=[["Hotel Palazzo Priuli","2:00 PM · start",45.4363,12.3439,"Hotel Palazzo Priuli is a historic Castello hotel near small canals and quiet lanes. It gives the family a calm base close to San Marco without sleeping on the loudest square.","Notice the canal-side setting and the old stone details near the entrance.","Christian: Venice works like a maze because streets grew around water, not cars.","Tori: Pick a landmark near the hotel so you can find it again.","Booking #6231598372"],["Bridge of Sighs","2:40 PM · ~15 min",45.4341,12.3409,"The Bridge of Sighs connected the Doge's Palace courts to the prison. The name comes from the idea that prisoners sighed at their last view of Venice.","The best exterior view is from Ponte della Paglia, looking back at the enclosed white bridge.","Christian: It is a beautiful bridge with a grim job, which is very Venice.","Tori: Make your most dramatic prisoner sigh for the photo.","Free exterior"],["Doge's Palace","3:00 PM · ~90 min",45.4338,12.34,"The Doge's Palace was Venice's government headquarters, courthouse, and ceremonial showpiece. Its pink-and-white Gothic exterior looks delicate, but the republic inside was powerful and disciplined.","Find the Giant's Staircase and the huge council rooms.","Christian: Venice was a republic with spies, trade routes, and serious political machinery.","Tori: Look for winged lions, the symbol of St. Mark and Venice.","Vivaticket"],["St. Mark's Basilica","4:30 PM line · 5:15 PM inside",45.4345,12.3397,"St. Mark's Basilica is Venice's glittering church, built to show the city's wealth and connections with Byzantium. Its mosaics turn the ceiling into a gold storybook.","Look up for gold mosaics and down for patterned marble floors that ripple slightly.","Christian: The church was also a trophy case for a trading empire.","Tori: Find as many winged lions as you can before leaving.","Free standby line · dress code"],["Campanile","6:00 PM · ~35 min",45.434,12.339,"The Campanile is the tall bell tower of St. Mark's Square, rebuilt after it collapsed in 1902. The elevator makes it the easiest big view in Venice.","From the top, notice there are almost no cars or roads, just roofs, canals, and lagoon.","Christian: This view explains why Venice became a sea power.","Tori: Try to spot a boat that looks tiny from above.","Ticket 171-B0X07VC"],["St. Mark's Square","6:35 PM · ~10 min",45.4342,12.3388,"Piazza San Marco is Venice's grand public room, framed by arcades, cafes, basilica domes, and the Campanile. Napoleon supposedly called it Europe's drawing room.","Look for how the square slopes and drains, a clue that acqua alta flooding is part of life here.","Christian: This is Venice showing off to diplomats, traders, and tourists across centuries.","Tori: Spin once and count how many clocks, lions, and arches you see.","Free"],["Mercerie","6:45 PM · ~20 min",45.4361,12.3378,"The Mercerie are the shopping lanes linking San Marco to Rialto. For centuries, people flowed through here buying silk, spices, books, and luxury goods.","Notice how the lanes narrow, bend, and suddenly open into tiny squares.","Christian: This is medieval retail traffic design. It still works because everyone walks.","Tori: Window-shop for the funniest mask.","Free"],["Rialto Bridge","7:05 PM · ~20 min",45.438,12.3359,"Rialto Bridge was the main crossing of the Grand Canal for centuries and still feels like Venice's busy hinge. Shops line the bridge, turning a crossing into a market street.","Stand at the center for the classic Grand Canal view with boats moving both ways.","Christian: A bridge with shops means every step could also make money.","Tori: Count gondolas from the top before the family moves on.","Free"],["Santa Maria della Salute","7:40 PM · ~15 min",45.4307,12.334,"Santa Maria della Salute was built after a plague, thanking Mary for the city's survival. Its huge dome anchors the mouth of the Grand Canal.","From the steps, look back toward San Marco across the water.","Christian: This church is a public memory of a disaster and a recovery.","Tori: Find the giant dome and decide if it looks like a crown or a cupcake.","Exterior stop"],["Accademia Bridge","7:55 PM · ~15 min",45.4318,12.3288,"The Accademia Bridge gives one of the best sunset views in Venice, looking down the Grand Canal toward Salute. It is wood, simple, and all about the view.","Face east for the postcard angle with Salute at the end of the canal.","Christian: This is the shot that explains Venice in one frame.","Tori: Pick the prettiest boat passing under the bridge.","Free"],["Dorsoduro Dinner","8:15 PM · ~90 min",45.4295,12.3268,"Dorsoduro is artsy, calmer, and easier for dinner after the San Marco crowds. It is a good neighborhood to slow down before the gondola finale.","Look for a small campo where kids can sit while adults order.","Christian: Dinner here is tactical: quieter lanes, better breathing room, less crowd crush.","Tori: Choose tonight's gelato color before dessert.","Pay as you go"],["Bacino Orseolo Gondola","10:00 PM · ~30 min",45.4348,12.337,"Bacino Orseolo is a tucked-away gondola basin just behind San Marco. At blue hour, the water reflects lights and the route feels quieter than midday.","Watch how the gondolier steers with one oar from the stern.","Christian: The gondola is asymmetrical on purpose, so it tracks straight with one rower.","Tori: Listen for the water sounds when the canals get narrow.","Gondola ride"]];window.TOUR_KIND='venice';</script><script src="tour-shared.js"></script><script src="venice.js"></script></body></html>

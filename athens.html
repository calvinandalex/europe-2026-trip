<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="icon" href="data:,"><title>🏛️ Athens Walking Tour</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Cinzel:wght@600;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><link rel="stylesheet" href="style.css"></head><body><main class="container"><header class="tour-hero"><h1>🏛️ Athens Walking Tour</h1><p class="subtitle">22 stops · Saturday, July 18</p><div class="stats"><div class="stat">22 stops</div><div class="stat">~8 hours</div><div class="stat">4 taxis budget EUR56</div></div><a class="top-link" href="index.html">← Back to trip</a></header><div class="route-note" id="routeNote"></div><div id="map" class="map"></div><section id="stopList"></section></main><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>window.TRIP_CONFIG={"supabaseUrl":"https://xsfvzedpkiqgipnftdxb.supabase.co","supabaseAnon":"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzZnZ6ZWRwa2lxZ2lwbmZ0ZHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3OTYyMTMsImV4cCI6MjA4NzM3MjIxM30.mytDq_kTTFTdZsT8OJYL9Zviz3JMN0HuqqKX1W-IhPM","family":[{"id":"calvin","emoji":"👨","name":"Calvin"},{"id":"karissa","emoji":"👩","name":"Karissa"},{"id":"christian","emoji":"👦","name":"Christian"},{"id":"tori","emoji":"👧","name":"Tori"}]};window.TOUR_STOPS=[["Panathenaic Stadium","8:00 AM · ~45 min","🚕 Uber from Vrbo",37.9683,23.7415,"sport","The marble stadium was rebuilt for the first modern Olympic Games in 1896 on the site of an ancient racecourse. Its long U shape makes it easy to picture crowds roaring for runners, wrestlers, and chariot events. Address: Leof. Vasileos Konstantinou, Athina 116 35, Greece.","The track is longer and narrower than a modern one, so sprinting a lap feels different right away.","Christian: Time a 100-meter dash and compare it with modern Olympic speeds.","Tori: Stand on the winners podium and pick your gold medal pose.","Walk-up tickets at entrance"],["Temple of Olympian Zeus","9:00 AM · ~25 min","🚕 Uber",37.9693,23.7331,"ancient","This was one of the largest temples in the ancient world, started in the 500s BC and finally finished under the Roman emperor Hadrian. Only a group of giant Corinthian columns still stands, which somehow makes the missing temple feel even bigger. Address: Temple of Olympian Zeus, Athens, Greece.","Find the fallen column on the ground and count the drum-shaped pieces like stone coins.","Christian: Imagine the engineering problem of lifting each column drum without cranes or motors.","Tori: Try to spot how tiny people look beside one column.","Exterior or quick entry"],["Arch of Hadrian","9:25 AM · ~10 min","🚶 Short walk",37.9702,23.7318,"ancient","Hadrian's Arch marked a symbolic line between old Greek Athens and the Roman emperor's new city. It is a small monument, but it tells the story of Athens becoming part of a much larger empire. Address: Arch of Hadrian, Athens, Greece.","Look for the two different inscriptions, one facing old Athens and one facing Hadrian's new district.","Christian: This is ancient branding: Hadrian wanted the city to remember who paid for the upgrades.","Tori: Stand where you can see the Acropolis through the arch.","Free exterior stop"],["Syntagma Square","9:45 AM · ~15 min","🚕 Uber",37.9755,23.7348,"gov","Syntagma means Constitution, and this square is modern Athens' civic front porch. Protests, celebrations, commuters, and travelers all pass through here. Address: Syntagma Square, Athens, Greece.","Watch how the square slopes up toward Parliament, almost like a stage.","Christian: This is where modern Greek democracy gets loud when people want change.","Tori: See how many pigeons and snack kiosks you can count before moving on.","Free"],["Old Parliament","10:00 AM · ~10 min","🚶 Walk",37.977,23.7336,"gov","The Old Parliament building housed Greece's parliament before the current one took over at Syntagma. Today it is tied to the story of modern Greece after independence from Ottoman rule. Address: Old Parliament, Stadiou 13, Athens, Greece.","Look for the mounted statue of Theodoros Kolokotronis out front.","Christian: Greece's modern independence story is much newer than the ruins nearby.","Tori: The horse statue makes this an easy photo stop.","Exterior pass-by"],["Academy of Athens","10:15 AM · ~10 min","🚶 Walk north",37.9805,23.7347,"gov","The Academy is the fanciest of Athens' neoclassical trio, built in the 1800s to echo ancient temples. Its columns, statues, and painted details show how modern Greece claimed the ancient style as its own. Address: Academy of Athens, Panepistimiou 28, Athens, Greece.","Look up for Athena and Apollo on tall columns guarding the entrance.","Christian: This is 1800s nation-building in marble, not an ancient ruin.","Tori: Find the owl, Athena's clever little symbol.","Exterior pass-by"],["University of Athens","10:25 AM · ~8 min","🚶 Walk",37.9802,23.7338,"gov","The central University building sits between the Academy and Library, forming the Neoclassical Trilogy. Its painted porch adds color that helps you imagine ancient buildings were not plain white. Address: National and Kapodistrian University of Athens, Panepistimiou 30, Athens, Greece.","Notice the fresco-style band across the front.","Christian: Ancient Greek buildings were painted brightly, even though museums often show white marble.","Tori: Pick your favorite color on the front porch.","Exterior pass-by"],["National Library","10:35 AM · ~8 min","🚶 Walk",37.98,23.7326,"gov","The old National Library completes the trilogy with a grand staircase and curved twin ramps. It once held some of Greece's most important books and manuscripts. Address: National Library of Greece, Panepistimiou 32, Athens, Greece.","Look for the sweeping stair design, like a marble ribbon.","Christian: A library was a power symbol too, because knowledge helped define the new country.","Tori: Walk your eyes up the curvy stairs and see where they meet.","Exterior pass-by"],["Changing of the Guard","11:00 AM · ~20 min","🚶 Walk back",37.9756,23.7353,"gov","The Evzones guard the Tomb of the Unknown Soldier in slow, precise movements. Their uniform connects modern soldiers to older Greek mountain fighters. Address: Tomb of the Unknown Soldier, Syntagma Square, Athens, Greece.","Watch the shoes: each pom-pom hides a hard shoe that snaps against the pavement.","Christian: The slow motion is discipline, not a show-off walk.","Tori: Try copying one slow step after the ceremony, away from the guards.","Free"],["Plaka Lunch","11:30 AM · ~90 min","🚕 Uber",37.9737,23.7295,"food","Plaka is the old neighborhood tucked under the Acropolis, full of lanes, shade, and small restaurants. Lunch here is the day's main reset before museums and ruins. Address: Plaka, Athens, Greece.","Choose a table with shade and order something cold first.","Christian: This is the strategy stop: food now makes the Acropolis possible later.","Tori: Pick the best dessert sign you see on the walk.","Pay as you go"],["Acropolis Museum","1:00 PM · ~2 hr","🚶 Walk 3 min",37.9684,23.7285,"ancient","This museum holds finds from the Acropolis slopes and temples, arranged so the Parthenon sculptures line up with the real hill above. Glass floors reveal excavated streets below. Address: Dionysiou Areopagitou 15, Athens 117 42, Greece.","On the top floor, compare the sculpture layout with the Parthenon visible outside.","Christian: The museum quietly makes Greece's case for returning the Parthenon sculptures from London.","Tori: Look down through the glass floor and find the old houses under your feet.","Order #880591"],["Ancient Agora","3:15 PM · ~35 min","🚕 Uber",37.9747,23.722,"ancient","The Agora was ancient Athens' marketplace and civic center, where people shopped, argued politics, and heard big ideas. Socrates walked this area before his trial and execution. Address: Ancient Agora of Athens, Adrianou 24, Athens 105 55, Greece.","Look for the Temple of Hephaestus above the site, one of the best-preserved Greek temples.","Christian: This was the daily-life side of democracy, messier than the Acropolis.","Tori: Count how many columns you can see from one shady spot.","Combo ticket area"],["Stoa of Attalos","3:45 PM · ~25 min","🚶 Inside Agora",37.9752,23.7236,"ancient","The Stoa of Attalos is a reconstructed ancient shopping arcade with two levels of columns. It helps the Agora feel less like scattered stones and more like a real city center. Address: Stoa of Attalos, Ancient Agora of Athens, Athens, Greece.","Find the difference between the outer Doric columns and the inner Ionic columns.","Christian: This is what an ancient mall looked like, with shade as the main luxury.","Tori: Walk under the columns and choose the best hiding spot from the sun.","Included with Agora"],["Monastiraki Square","4:15 PM · ~30 min","🚶 Walk 2 min",37.9762,23.7251,"food","Monastiraki is a busy square where old Athens, flea-market energy, metro trains, and Acropolis views collide. It is perfect for a cold drink before the final climb. Address: Monastiraki Square, Athens 105 55, Greece.","Stand where you can see the Acropolis above the rooftops.","Christian: This is the city layered at once: ancient, Ottoman, modern, touristy, all in one view.","Tori: Granita break. Pick the brightest color.","Free"],["Theatre of Dionysus","5:00 PM · ~20 min","🚕 Uber to south slope",37.9703,23.7285,"ancient","This theatre is where Athens developed tragedy and comedy as civic events, not just entertainment. Thousands sat here for plays by writers like Sophocles and Euripides. Address: Theatre of Dionysus, Athens, Greece.","Look for the stone throne seats in the front row.","Christian: Superhero movies have roots in this place: huge public stories about power, fate, and bad choices.","Tori: Pick the seat where you would want to watch a play.","Acropolis ticket"],["Propylaea","5:30 PM · ~20 min","🚶 Climb",37.9715,23.7257,"ancient","The Propylaea is the monumental gateway to the Acropolis, designed to make the entrance feel like a ceremony. Everyone funnels through it before the sacred plateau opens up. Address: Propylaea, Acropolis of Athens, Athens, Greece.","Notice how the view suddenly widens after the gate.","Christian: This is ancient crowd control with drama built in.","Tori: Pretend you are entering a stone castle in the sky.","Acropolis ticket"],["Temple of Athena Nike","5:50 PM · ~10 min","🚶 Steps away",37.9715,23.7249,"ancient","This small temple honors Athena as bringer of victory and sits like a lookout at the edge of the Acropolis. Its size makes it easier to read than the giant Parthenon. Address: Temple of Athena Nike, Acropolis of Athens, Athens, Greece.","Look for the high perch over the entrance path.","Christian: Nike means victory long before it meant sneakers.","Tori: Tiny temple, huge view. Find the city below.","Acropolis ticket"],["Parthenon","6:05 PM · ~35 min","🚶 Walk",37.9715,23.7267,"ancient","The Parthenon was built from 447 to 432 BC for Athena, patron goddess of Athens. It became the clearest symbol of the city's power, wealth, and artistic confidence. Address: Parthenon, Acropolis of Athens, Athens, Greece.","The columns swell slightly in the middle and the lines curve so the temple looks straight to human eyes.","Christian: The missing sculptures are part of the Elgin Marbles fight between Greece and Britain.","Tori: Look for tiny holes where bronze shields once hung after wars.","Acropolis ticket"],["Erechtheion","6:45 PM · ~20 min","🚶 Walk",37.9721,23.7264,"ancient","The Erechtheion is the Acropolis' odd-shaped sacred building, tied to Athena, Poseidon, and old Athenian legends. It had to fit several holy spots instead of following a neat rectangle. Address: Erechtheion, Acropolis of Athens, Athens, Greece.","Find the six Caryatids, the sculpted maidens holding up the porch.","Christian: This building is myth and architecture trying to share one tight space.","Tori: Choose which Caryatid has the best hairstyle.","Acropolis ticket"],["Odeon of Herodes Atticus","7:15 PM · ~20 min","🚶 Exit downhill",37.9708,23.7246,"ancient","This Roman-era stone theatre was built in the second century AD and is still used for concerts. It shows that Athens kept changing long after the classic Greek period. Address: Odeon of Herodes Atticus, Athens, Greece.","Look for the steep seating bowl facing the stage wall.","Christian: Ancient places can still be working venues, not just museum pieces.","Tori: Imagine a singer on stage with the whole city listening.","View from route"],["Mount Lycabettus","8:15 PM · ~1 hr","🚕 Uber",37.9838,23.7436,"view","Lycabettus is Athens' best sunset balcony, rising above the city northeast of the Acropolis. The funicular saves legs after a huge day. Address: Mount Lycabettus, Athens 114 71, Greece.","At sunset, find the Acropolis glowing below and the sea beyond Piraeus.","Christian: This is the geography recap, with the whole day spread out underneath you.","Tori: Pick the first city light that turns on.","Funicular tickets"],["Koukaki Dinner","9:30 PM · ~90 min","🚕 Uber",37.9649,23.7245,"food","Koukaki is a calmer neighborhood south of the Acropolis with good dinner options after the crowds thin. It is close enough to feel central but easier at the end of the day. Address: Koukaki, Athens, Greece.","Look back for night views of the Acropolis as you walk in.","Christian: Victory meal. You survived a museum, ruins, and a mountain in one day.","Tori: Choose the family's official dessert of Athens.","Pay as you go"]];window.TOUR_KIND='athens';</script><script src="tour-shared.js"></script><script src="athens.js"></script></body></html>

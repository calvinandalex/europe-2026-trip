-side ancient Athens stop."],["9:45 AM","📸 Syntagma + Old Parliament","Photos and a reset near Parliament."],["10:15 AM","🏛️ Neoclassical Trilogy walk-by","Academy, University, Library."],["11:00 AM","⚔️ Changing of the Guard","Top-of-hour ceremony at the Tomb of the Unknown Soldier."],["11:30 AM","🍽️ Long Plaka lunch","90 minutes, shaded and cool."],["1:00 PM","🏛️ Acropolis Museum","Order #880591 · 2 hours.","Order #880591"],["3:15 PM","🏛️ Ancient Agora + Stoa of Attalos","Inside the combo-ticket zone."],["4:15 PM","🛍️ Monastiraki Square","Granita or cold drink break."],["5:00 PM","🏛️ ACROPOLIS","Hellenic Heritage · Theatre, Propylaea, Nike, Parthenon, Erechtheion.","Timed entry booked · 5:00 PM"],["8:15 PM","🚡 Mount Lycabettus + sunset","Funicular and sunset view."],["9:30 PM","🍽️ Koukaki dinner","Mani Mani or similar."]]},{"n":4,"cls":"green","icon":"🚢","date":"Sunday, July 19","title":"Embark Norwegian Pearl","prep":["Passport","Cruise docs","Ship key lanyard","Swimsuit accessible"],"booking":["Norwegian Pearl Reservation 65073715","Cabin 11608 · Club Balcony Suite","NCL support 1-800-327-7030","Booked via Costco Travel C490276461"],"items":[["10:00 AM","🏠 Check out of Vrbo","Leave bags ready for port transfer."],["Morning","🏛️ Optional Ancient Agora","Use only if it slipped from Athens day."],["5:00 PM","🚢 Head to Piraeus port","Pad the drive. Port traffic can stack up."],["8:00 PM","🚢 Embark Norwegian Pearl","Reservation 65073715 · Cabin 11608 · Freestyle dining.","NCL conf 65073715 · Cabin 11608"],["Evening","🍽️ Dinner on ship","Easy first night aboard."]]},{"n":5,"cls":"purple","icon":"🌋","date":"Monday, July 20","title":"Santorini","prep":["Cable car tickets on phone","Sunscreen","Water shoes"],"booking":["Santorini Cable Car Order 019e45b0-5cdb-7cc6-985f-1847fec558a1","Santorini tour booking reference 1399732915","Santoriginal Tours +30 693 686 2736"],"items":[["7:00 AM","⚓ Arrive Santorini","Tender timing can change. Watch ship announcements."],["7:30 AM","🚡 Santorini Cable Car","4 tickets · Order 019e45b0.","Order 019e45b0-5cdb-7cc6-985f-1847fec558a1"],["8:00 AM","🏛️ Must-See Highlights Private Tour","7 hours · Santoriginal Tours · +30 693 686 2736.","Viator 1399732915 · $826.53"],["6:00 PM","⚓ Depart Santorini","Be back with buffer before sailing."]]},{"n":6,"cls":"orange","icon":"🏺","date":"Tuesday, July 21","title":"Katakolon (Olympia)","prep":["Look for J.A.T. sign at port","Hats","Water"],"booking":["Viator confirmation 1782170755","Booking reference 1399735385","Tickets and Tours +30 690 921 5086"],"items":[["9:00 AM","⚓ Arrive Katakolon","Meet near the cruise port."],["9:30 AM","🏛️ Best Olympia Tour","4.5 hours · Tickets and Tours · look for J.A.T. sign.","Viator 1399735385 · $593.58"],["7:00 PM","⚓ Depart Katakolon","Back aboard after Olympia."]]},{"n":7,"cls":"teal","icon":"🚗","date":"Wednesday, July 22","title":"Corfu","prep":["Driver's license","Credit card for rental","Water shoes","Swimsuits and towels","Sunscreen","Euros for boat tour"],"booking":["Corfu Sunrise Reservation #035870","Port office: 16 Ethnikis Antistaseos St, New Port","Phone +30 26610 26511","Sea cave boats are usually walk-up from Paleokastritsa beach","Pickup sign: yellow SUNRISE Car Rental sign"],"items":[["7:00 AM","⚓ Arrive Corfu","Ship docks at New Port. Quick start matters because the best Corfu day is spread across the island."],["8:00 AM","🚗 Pick up Corfu Sunrise rental car","Reservation #035870 at 16 Ethnikis Antistaseos St. Rental car makes the Kanoni, Achilleion, and Paleokastritsa loop realistic. Look for the yellow SUNRISE Car Rental sign at port pickup.","Res #035870 · EUR97.16 pay on arrival"],["8:30 AM","📸 Kanoni, Vlacherna Monastery, and Mouse Island","Cross the tiny causeway for Corfu's signature photo. This view of Pontikonisi and the white monastery exists only here."],["9:45 AM","🏛️ Achilleion Palace","Kaiser Wilhelm II's Greek Revival palace with Achilles statues and sea-view gardens. It is one of the rare neoclassical palaces on a Greek island."],["12:00 PM","🍽️ Cliffside taverna lunch","Order Corfiot bourdeto or sofrito if available. Corfu's Venetian-Greek food is different from mainland Greece and the cruise ports."],["1:30 PM","⛪ Paleokastritsa Monastery","Small 13th-century clifftop monastery with huge blue-water views. It frames the coves before the boat ride."],["2:15 PM","🚤 Paleokastritsa sea cave boat tour","Small motorboats reach emerald caves that are not visible from the road. This is the do-not-miss Corfu moment."],["2:45 PM","🏖️ Swim at Paleokastritsa main cove or La Grotta","Turquoise cove swim after the caves. Paleokastritsa is the beach scenery Corfu is famous for."],["3:30 PM","🚗 Drive back to Corfu port","Leave a full hour through the olive-grove roads so the day stays relaxed."],["5:00 PM","🚗 Drop off rental and board ship","Return at New Port before sailing. The car is the key piece to close the loop cleanly."]]},{"n":8,"cls":"deep","icon":"🚤","date":"Thursday, July 23","title":"Kotor, Montenegro","prep":["Water shoes","Swimsuit for Blue Cave","Towel","Hat","Extra water for fortress climb"],"booking":["Blue Cave + Secret Tunnels + Lady of the Rocks Tour","3 hours · meet at noon","Kotor port window: 7:30 AM-6:00 PM","Viator Blue Cave + Lady of the Rocks tour already booked"],"items":[["7:30 AM","⚓ Arrive Kotor","Watch the sail-in if everyone is awake. The Bay of Kotor is the Adriatic's dramatic fjord-like ria."],["7:45 AM","⛪ St. Tryphon Cathedral","One of the oldest active cathedrals in the Adriatic, built in 1166. The silver saint's casket and mixed Romanesque-Baroque layers make it very Kotor."],["8:15 AM","🧱 Start the San Giovanni Fortress walls climb","Begin before the heat. The medieval switchback walls climb above town for the view that only Kotor can give."],["9:30 AM","🏔️ Top of San Giovanni Fortress","Look down at the ship, the walled town, and mountains around the bay. This is the only fjord-style panorama on the trip."],["10:15 AM","🚶 Descend to Old Town","Coming down is easier, but take it slow on the stone steps. The walls are part of Kotor's UNESCO fortress system."],["11:00 AM","🥐 Cafe and water break in Old Town","Reset before the boat tour. Kotor's compact old town is a living fortress, not a staged cruise village."],["12:00 PM","🚤 Blue Cave + Secret Tunnels + Lady of the Rocks tour","Booked three-hour water tour. The boat shows the bay geography from sea level plus the island church stop.","Viator booked · 12:00-3:00 PM"],["3:15 PM","🍽️ Late lunch at an Old Town konoba","Try Njeguski prsut and local cheese if they have it. Montenegro's mountain-meets-sea food is different from the Greek and Croatian stops."],["4:30 PM","🐈 Old Town streets and Kotor cats","Short wander through the walled lanes. Kotor is famous for its cats, even enough to have a Cats Museum."],["5:00 PM","📸 Waterfront photos with ship and bay","Best quick family photo setup: ship behind you, mountains wrapped around the water."],["5:30 PM","⚓ Back on ship","Board with buffer before the 6:00 PM departure."]]},{"n":9,"cls":"coral","icon":"🏰","date":"Friday, July 24","title":"Split, Croatia","prep":["Comfortable walking shoes","Sunscreen","Swimsuits under clothes","Small towel","Euros for palace tickets"],"booking":["No tour booked","On foot day from port","Diocletian's Palace, Marjan Hill, and Bacvice Beach"],"items":[["7:00 AM","⚓ Arrive Split","Walk off early while the palace lanes are still quiet."],["7:15 AM","🚶 Walk from port to Old Town","The port is close enough to keep this as a full walking day."],["7:30 AM","🏛️ Enter Diocletian's Palace via Silver Gate","This is the only still-inhabited Roman imperial palace in the world. Real apartments and cafes sit inside 1,700-year-old walls."],["7:35 AM","📸 Peristyle","Central courtyard with black granite sphinxes Diocletian brought from Egypt. It feels like Rome, Egypt, and Croatia stacked together."],["7:45 AM","⛪ Cathedral of St. Domnius and Bell Tower","Climb beside the converted mausoleum of Emperor Diocletian. The Christian cathedral inside his tomb is the wild Split twist."],["8:45 AM","🎬 Palace Basements","Roman cellar halls under the palace. Christian may recognize them as Daenerys' throne-room setting from Game of Thrones."],["9:15 AM","🏛️ Jupiter's Temple","Tiny former Roman temple now used as a baptistery. It is one of the palace's best hidden corners."],["9:30 AM","🚶 Cardo and Decumanus streets","Walk the Roman street grid that locals still use for normal daily life."],["10:00 AM","🦶 Golden Gate and Gregory of Nin statue","Exit through the grand north gate and rub Gregory's shiny toe. Locals do it for good luck."],["10:15 AM","🌳 Walk up Marjan Hill","Staircase behind the Riva starts Split's green escape. The hill gives a different view than the palace streets."],["11:15 AM","🏔️ Telegrin Peak viewpoint","Highest Marjan viewpoint with Split, islands, and the ship in one sweep. This is the big city-and-sea photo."],["12:45 PM","🍽️ Konoba lunch","Order pasticada or fresh grilled fish if available. Dalmatian food is the local flavor for this port."],["2:30 PM","🏖️ Bacvice Beach","Sandy city beach close to port. It is the birthplace and home court of picigin."],["2:45 PM","🌊 Watch or try picigin","Split's own shallow-water ball game, invented here in the 1920s. This is the cultural thing you cannot do anywhere else."],["3:45 PM","🍨 Gelato walk back","Cool-down treat on the way toward the harbor."],["5:00 PM","⚓ Back on ship","Return to Norwegian Pearl before sailing."]]},{"n":10,"cls":"mint","icon":"🏞️","date":"Saturday, July 25","title":"Koper, Slovenia","prep":["Driver's license","Credit card for SIXT","Light jacket for cave","Closed-toe shoes","Book Postojna Cave tickets online","Snacks for road trip"],"booking":["SIXT rental car","Pickup Koper Pristaniska 21","Book Postojna tickets: https://www.postojnska-jama.eu/en/tickets/","Best target: 11:00 AM cave tour, or cave + castle package if available","SIXT rental booked 8:00 AM-6:00 PM"],"items":[["8:00 AM","⚓ Arrive Koper and pick up SIXT rental","Pickup at Koper Pristaniska 21. Start right away because Slovenia's best stops are inland.","SIXT rental booked · 8:00 AM-6:00 PM"],["8:15 AM","🚗 Drive to Predjama","About 55 minutes. The coast gives way to karst country, which is the whole point of this Slovenia day."],["9:15 AM","🏰 Predjama Castle","World's largest cave castle, built straight into a 400-foot cliff. It is the 'wait, that is real?' stop of the trip."],["10:30 AM","🚗 Drive to Postojna Cave","Short 10-minute hop from castle to cave, so the pair works well together."],["11:00 AM","🚂 Postojna Cave train tour","Europe's largest show cave and the only cave in the world with a passenger train ride through it. Watch for the olm, the pale cave salamander."],["12:30 PM","🍽️ Lunch at Postojna Cave restaurant","Try struklji or jota if available. This keeps the road day simple before heading back toward the coast."],["2:00 PM","🚗 Drive to Piran","About 35 minutes from Postojna. Piran adds a quick Adriatic Slovenia contrast after the cave world."],["2:45 PM","📸 Piran quick hit","Tartini Square and the Church of St. George bell tower. It is Slovenia's Venetian-flavored coastal postcard."],["4:00 PM","🚗 Drive back to Koper","About 25 minutes. Return earlier than necessary so the final cruise afternoon does not get stressful."],["4:30 PM","🚗 Drop off rental","Return the SIXT car with fuel and paperwork handled."],["7:00 PM","⚓ Depart Koper","Last cruise night after Slovenia's cave-castle day."]]},{"n":11,"cls":"gold","icon":"🛶","date":"Sunday, July 26","title":"Ravenna Disembark → Venice","link":["📖 Open Venice walking tour →","venice.html"],"prep":["Knee-length shorts or pants for men","Shawl for Tori for Basilica dress code","Passport for hotel check-in","Basilica dress code: knees and shoulders covered; no flip-flops"],"booking":["Hotel Palazzo Priuli Booking #6231598372","Address: Fondamenta de l'Osmarin 4979/b, Castello","Campanile ticket 171-B0X07V
